version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: resume-redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: resume-backend
    restart: always
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - REDIS_HOST=redis
    depends_on:
      - redis

  frontend:
    build: ./frontend
    container_name: resume-frontend
    restart: always
    ports:
      - "80:80" # 左侧为服务器对外的端口，右侧为容器内 Nginx 端口
    depends_on:
      - backend